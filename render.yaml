services:
  - type: web
    name: bp-fei-monitoring
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bp-fei-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: bp-fei-db
    plan: free